<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cyber Neethi - Secure Incident Reporting</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+Malayalam:wght@400;700&amp;family=Noto+Sans+Malayalam:wght@400;500;600&amp;family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#ffb3b1",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed-variant": "#910618",
                        "surface": "#f9f9f9",
                        "outline": "#8f6f6e",
                        "on-secondary-container": "#60000b",
                        "tertiary-container": "#6c748b",
                        "surface-variant": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#db313f",
                        "on-primary-container": "#fffbff",
                        "on-primary-fixed-variant": "#92001c",
                        "on-primary-fixed": "#410007",
                        "surface-dim": "#dadada",
                        "outline-variant": "#e4bebc",
                        "secondary-fixed-dim": "#ffb3b1",
                        "error": "#ba1a1a",
                        "tertiary": "#545c72",
                        "surface-container-low": "#f3f3f3",
                        "tertiary-fixed-dim": "#bec6e0",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e8e8e8",
                        "secondary-fixed": "#ffdad7",
                        "primary-fixed-dim": "#ffb3b1",
                        "surface-tint": "#bb152c",
                        "background": "#f9f9f9",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#fefcff",
                        "primary": "#b7102a",
                        "surface-container": "#eeeeee",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#dae2fd",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#131b2e",
                        "on-secondary-fixed": "#410005",
                        "secondary-container": "#fd5c5b",
                        "inverse-on-surface": "#f0f1f1",
                        "primary-fixed": "#ffdad8",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "secondary": "#b4262d",
                        "on-surface-variant": "#5b403f",
                        "inverse-surface": "#2f3131",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "on-surface": "#1a1c1c"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif Malayalam", "Noto Serif", "serif"],
                        "body": ["Noto Sans Malayalam", "Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background: radial-gradient(circle at top, rgba(183, 16, 42, 0.08) 0%, #f9f9f9 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-body text-on-surface min-h-screen pb-32">
    <!-- Top Navigation Bar -->
    <nav
        class="sticky top-0 w-full rounded-b-none bg-white/70 dark:bg-slate-900/70 backdrop-blur-md shadow-sm dark:shadow-none z-50">
        <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
            <span class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-50">Cyber Neethi</span>
            <button
                class="bg-primary-container text-on-primary-container px-5 py-2 rounded-full font-bold text-sm hover:opacity-90 active:scale-95 transition-all">
                Get Help
            </button>
        </div>
    </nav>
    <main class="px-6 pt-8 max-w-md mx-auto">
        <!-- Hero Section -->
        <header class="mb-10 text-center">
            <h1 class="font-headline text-4xl font-bold text-on-surface mb-4 leading-tight">
                സൈബർ നീതി
            </h1>
            <p class="text-on-surface-variant leading-relaxed px-4">
                നിങ്ങളുടെ ഡിജിറ്റൽ സുരക്ഷ ഞങ്ങളുടെ ഉത്തരവാദിത്തം. പരാതികൾ സുരക്ഷിതമായി സമർപ്പിക്കുക.
            </p>
        </header>
        <!-- Reporting Form Container -->
        <section class="glass-card rounded-xl p-8 shadow-[0_20px_40px_rgba(15,23,42,0.06)] relative overflow-hidden">
            <!-- Signature Accent -->
            <div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
            <form class="space-y-6">
                <!-- Name Field -->
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">പൂർണ്ണനാമം</label>
                    <input
                        class="w-full bg-surface-container-low border-none rounded-md px-5 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/30 transition-all"
                        placeholder="നിങ്ങളുടെ പേര് നൽകുക" type="text" />
                </div>
                <!-- Incident Type -->
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">വിഷയം</label>
                    <select
                        class="w-full bg-surface-container-low border-none rounded-md px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary/30 transition-all appearance-none">
                        <option>വിഷയം തിരഞ്ഞെടുക്കുക</option>
                        <option>തട്ടിപ്പ് (Fraud)</option>
                        <option>അധിക്ഷേപം (Harassment)</option>
                        <option>ഹാക്കിംഗ് (Hacking)</option>
                    </select>
                </div>
                <!-- Upload Area -->
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">തെളിവുകൾ
                        അപ്‌ലോഡ് ചെയ്യുക</label>
                    <div
                        class="border-2 border-dashed border-outline-variant rounded-md p-8 text-center bg-surface-container-lowest/40 hover:bg-surface-container-lowest/60 transition-colors cursor-pointer group">
                        <span
                            class="material-symbols-outlined text-4xl text-primary mb-3 block group-hover:scale-110 transition-transform">cloud_upload</span>
                        <span class="text-sm font-medium text-on-surface-variant block">Upload Screenshot</span>
                        <span class="text-xs text-outline mt-1 block">JPG, PNG up to 10MB</span>
                    </div>
                </div>
                <!-- Description -->
                <div>
                    <label
                        class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2 ml-1">വിവരണം</label>
                    <textarea
                        class="w-full bg-surface-container-low border-none rounded-md px-5 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/30 transition-all resize-none"
                        placeholder="നടന്ന കാര്യങ്ങൾ വിശദീകരിക്കുക..." rows="4"></textarea>
                </div>
                <!-- Privacy Consent -->
                <div class="flex items-start gap-3 px-1">
                    <input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary" id="consent"
                        type="checkbox" />
                    <label class="text-xs text-on-surface-variant leading-relaxed" for="consent">
                        എന്റെ വിവരങ്ങൾ സുരക്ഷിതമായി കൈകാര്യം ചെയ്യുമെന്നും നിബന്ധനകൾ അംഗീകരിക്കുന്നുവെന്നും ഞാൻ
                        ഉറപ്പുനൽകുന്നു.
                    </label>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full h-[3.5rem] rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2"
                    type="submit">
                    സമർപ്പിക്കുക
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                </button>
            </form>
        </section>
        <!-- Trust Indicator -->
        <div class="mt-12 flex flex-col items-center gap-4 text-center opacity-70">
            <div class="flex gap-4">
                <span class="material-symbols-outlined text-outline">verified_user</span>
                <span class="material-symbols-outlined text-outline">encrypted</span>
                <span class="material-symbols-outlined text-outline">gavel</span>
            </div>
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline">
                End-to-End Encrypted Solidarity
            </p>
        </div>
    </main>
    <!-- Floating Footer Navigation -->
    <footer
        class="fixed bottom-6 left-1/2 -translate-x-1/2 rounded-full px-8 py-3 w-[90%] max-w-sm bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-sm shadow-[0_20px_40px_rgba(15,23,42,0.06)] flex items-center justify-between z-40">
        <a class="text-slate-500 hover:text-red-600 flex flex-col items-center gap-1 transition-colors" href="#">
            <span class="material-symbols-outlined text-xl">home</span>
            <span class="text-[10px] uppercase font-sans font-bold">Home</span>
        </a>
        <a class="font-bold text-slate-900 dark:text-slate-50 flex flex-col items-center gap-1" href="#">
            <span class="material-symbols-outlined text-xl"
                style="font-variation-settings: 'FILL' 1;">description</span>
            <span class="text-[10px] uppercase font-sans font-bold">Report</span>
        </a>
        <a class="text-slate-500 hover:text-red-600 flex flex-col items-center gap-1 transition-colors" href="#">
            <span class="material-symbols-outlined text-xl">library_books</span>
            <span class="text-[10px] uppercase font-sans font-bold">Laws</span>
        </a>
        <a class="text-slate-500 hover:text-red-600 flex flex-col items-center gap-1 transition-colors" href="#">
            <span class="material-symbols-outlined text-xl">account_circle</span>
            <span class="text-[10px] uppercase font-sans font-bold">Profile</span>
        </a>
    </footer>
</body>

</html>
